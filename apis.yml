aid: ernst-and-young
name: Ernst & Young (EY)
description: >-
  Ernst & Young (EY) is one of the Big Four professional services
  organizations, operating as a global network of member firms branded
  under "EY" and coordinated by Ernst & Young Global Limited (EYG). EY
  reports a workforce of roughly 400,000 people spanning approximately
  150 countries. The firm's stated purpose is "Building a better working
  world" and it organizes delivery across a small set of professional
  service lines — Assurance, Consulting, Strategy & Transactions
  (branded as EY-Parthenon, covering both Strategy and Transactions and
  Corporate Finance), Tax, Law, Technology, Managed Services, and
  People & Workforce Services — plus EY Private (services for
  privately-held and entrepreneur-led businesses) and EY Sustainability.
  Industry coverage is organized into eight sectors: Industrials &
  Mobility, Consumer Products & Retail, Energy & Resources, Financial
  Services, Government & Infrastructure, Health & Life Sciences,
  Private Equity, and Technology, Media & Telecommunications.
  EY's flagship technology initiative is EY.ai, positioned as an
  enterprise-scale "agentic AI unifying platform" backed by alliances
  with NVIDIA, Microsoft, IBM, SAP, ServiceNow and others. Adjacent
  platform brands include EY Nexus (a sector-tailored business
  transformation platform marketed primarily to financial services),
  EY Studio+ (customer experience / growth), EY Ecosystems
  (partnership network), and EY wavespace (innovation centers).
  EY's research-publishing surface is the EY Insights portfolio,
  organized around topic areas (AI, Finance, Geostrategy, People and
  Workforce, Risk, Sustainability, Technology, EY Transformation) and
  flagship recurring series including the CEO Outlook, EY Megatrends,
  Global IPO Trends, the Private Equity Pulse, Work Reimagined, the
  Climate Action Barometer, and the Nature Action Barometer, plus
  EY Podcasts and EY Webcasts. Project Everest — the proposed split
  of EY's audit and consulting businesses — was publicly cancelled in
  April 2023, and EY continues to operate as an integrated multi-line
  professional services organization. EY does not publish a public
  developer portal, OpenAPI specifications, public REST APIs, or a
  consumer-facing API pricing surface at the global corporate level.
  The only first-party EY GitHub organization that is publicly
  discoverable is EYBlockchain (github.com/EYBlockchain, ~28 public
  repositories, ~160 followers, blog URL blockchain.ey.com), which
  hosts EY's open-source zero-knowledge cryptography and
  privacy-preserving blockchain work, anchored by the Nightfall
  optimistic-rollup family (Nightfall_3 in JavaScript / Nightfall_4
  Community Edition in Rust) and the Starlight Solidity-to-zApp
  transpiler, alongside supporting libraries such as Timber, Poseidon,
  halo2-lib, snark-verifier, plonkish, algebra, and ZoKrates wrappers,
  plus product brands EY Blockchain Analyzer (Reconciler and Smart
  Contract & Token Review) and the EY OpsChain Suite (Traceability,
  ESG, Contract Manager).
