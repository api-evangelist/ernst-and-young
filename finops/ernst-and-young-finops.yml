meters:
  - name: engagement_contract
    description: >-
      Master engagement contract — not a metered unit; costs flow
      through time-and-materials, fixed-fee, or
      managed-services-subscription invoicing from the relevant EY
      member firm.
    unit: contract
    aggregation: count
    dimensions:
      - client
      - member_firm
      - service_line
principles:
  - name: Visibility
    description: >-
      Track EY cost as professional-services spend on the client GL,
      not as a metered API line.
  - name: Allocation
    description: >-
      Allocate engagement cost to the sponsoring business unit;
      pass-through hyperscaler costs incurred during an EY Managed
      Services arrangement or an EY.ai-backed delivery should be
      allocated through the underlying cloud bill rather than the EY
      invoice.
  - name: Optimization
    description: >-
      Optimize by aligning engagement scope with the FinOps practices
      EY itself advises clients to adopt on hyperscaler workloads,
      ensuring scope-creep does not erode engagement value.
  - name: Accountability
    description: >-
      Engagement sponsor on the client side and the EY engagement
      partner share accountability for cost and value delivered.
