description: >-
  Ernst & Young (EY) has no public developer API and no metered
  billing surface. Costs flow through Assurance, Consulting, Strategy
  & Transactions (EY-Parthenon), Tax, Law, Technology, Managed
  Services, and People & Workforce engagement contracts and appear
  on client books as professional-services spend, not as a metered
  API invoice. EY itself runs FinOps and cloud financial-management
  advisory practices for clients on hyperscaler spend (frequently
  delivered through EY.ai-backed automations and EY Ecosystem alliances
  with Microsoft, AWS, Google Cloud, Oracle, SAP, and ServiceNow),
  but does not consume FinOps for its own corporate offerings.
notes: >-
  No public developer API — placeholder only. EY's FinOps practice is
  an advisory offering, not a billed EY API product. The open-source
  EY Blockchain releases (Nightfall, Starlight, etc.) carry no EY
  billing line at all; downstream operators bear chain, node, and
  infra cost directly.
